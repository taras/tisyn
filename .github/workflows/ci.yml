name: Verify
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run format:check
      - run: pnpm run build
      - run: pnpm run test
      - name: tisyn-cli corpus drift check
        run: |
          pnpm --filter @tisyn/spec run emit:cli
          git diff --exit-code specs/tisyn-cli-specification.md specs/tisyn-cli-test-plan.md
